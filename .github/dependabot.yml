version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
      timezone: "Europe/Amsterdam"
    groups:
      python-dependencies:
        patterns:
          - "*"
    open-pull-requests-limit: 8

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:15"
      timezone: "Europe/Amsterdam"
    groups:
      docker-base-images:
        patterns:
          - "*"
    ignore:
      - dependency-name: "python"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
    open-pull-requests-limit: 4

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
      timezone: "Europe/Amsterdam"
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 6
