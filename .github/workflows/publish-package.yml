name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index target"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: publish-package-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install packaging tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/*

  publish-testpypi:
    needs:
      - build
    if: github.event.inputs.repository == 'testpypi'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/flits
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  smoke-test-testpypi:
    needs:
      - publish-testpypi
    if: github.event.inputs.repository == 'testpypi'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install from TestPyPI
        run: |
          python -m venv /tmp/flits-testpypi
          . /tmp/flits-testpypi/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            python -m pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple flits && break
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 30
          done
          flits --help

  publish-pypi:
    needs:
      - build
    if: github.event.inputs.repository == 'pypi'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/flits
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  smoke-test-pypi:
    needs:
      - publish-pypi
    if: github.event.inputs.repository == 'pypi'
    runs-on: ubuntu-latest

    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install from PyPI
        run: |
          python -m venv /tmp/flits-pypi
          . /tmp/flits-pypi/bin/activate
          python -m pip install --upgrade pip
          for attempt in 1 2 3 4 5; do
            python -m pip install flits && break
            if [ "$attempt" -eq 5 ]; then
              exit 1
            fi
            sleep 30
          done
          flits --help
